services:
  # Unified Service - Backend + Frontend on same URL
  - type: web
    name: fasal-mitra
    runtime: node
    buildCommand: cd frontend && npm ci && npx vite build && cd ../backend && npm ci
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
